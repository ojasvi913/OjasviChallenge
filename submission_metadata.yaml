  pre_computation_required: false
  pre_computation_time_minutes: 0

# ============================================================================
# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Gemini"

ai_usage_summary: |
  Used an autonomous AI agent to assist in parsing the job description, rapidly prototyping feature extraction functions, tuning ranking weights via data distribution analysis, and generating the reasoning strings. All core logic and architecture decisions were heavily engineered and rigorously evaluated.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  A hybrid pipeline utilizing BM25 for initial semantic recall, followed by rigorous handcrafted feature engineering for precision ranking. We extract 44 features evaluating production deployment scale, technical depth in Search/Retrieval systems, and career trajectory. We intentionally avoid LLMs/Vector Embeddings during inference to easily meet the 5-minute CPU constraint while guaranteeing 0% hallucination and completely neutralizing keyword-stuffer honeypots. Reasoning strings are deterministically generated via a combinatorial CFG grammar architecture.

# ============================================================================
# Declarations
# ============================================================================
declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true
