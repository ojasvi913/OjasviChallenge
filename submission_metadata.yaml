# ============================================================================
# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Google Antigravity"

ai_usage_summary: |
  Used an autonomous Google Antigravity to assist in extracting JD requirements, rapidly prototyping feature engineering functions, tuning ranking weights via data distribution analysis, and generating the reasoning strings. All core logic and architecture decisions were heavily engineered and rigorously evaluated.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  A hybrid pipeline utilizing BM25 for initial semantic recall, followed by rigorous handcrafted feature engineering for precision ranking. We extract 44 features evaluating production deployment scale, technical depth in Search/Retrieval systems, and career trajectory. We intentionally avoid LLMs/Vector Embeddings during inference to easily meet the 5-minute CPU constraint while guaranteeing 0% hallucination and avoiding keyword-stuffer honeypots. Reasoning strings are deterministically generated using a combinatorial CFG grammar architecture.

